<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ViolentDeck — Авторизация</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="auth-page">
    <header>
      <p class="eyebrow">Добро пожаловать</p>
      <h1>ViolentDeck</h1>
      <p class="subtitle">Войдите в аккаунт, чтобы перейти в магазин.</p>
    </header>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="flash-box">
        {% for message in messages %}
          <p>{{ message }}</p>
        {% endfor %}
      </div>
    {% endif %}
    {% endwith %}
    <section class="form-row">
      <form class="form-card" action="{{ url_for('login') }}" method="post">
        <label>
          Логин
          <input name="login_username" type="text" placeholder="Введите логин" required>
        </label>
        <label>
          Пароль
          <input name="login_password" type="password" placeholder="Введите пароль" required>
        </label>
        <div class="actions">
          <button type="submit" class="primary">Войти</button>
        </div>
        <a class="ghost-button link-button" href="{{ url_for('forgot_password') }}">Забыли пароль?</a>
        <p class="subtitle">Нет аккаунта?</p>
        <a class="ghost-button link-button" href="{{ url_for('register') }}">Зарегистрироваться</a>
      </form>
    </section>
  </main>
</body>
</html>
