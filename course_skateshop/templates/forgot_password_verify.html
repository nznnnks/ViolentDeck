<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ViolentDeck — Подтверждение восстановления</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="auth-page">
    <header>
      <p class="eyebrow">Восстановление пароля</p>
      <h1>Введите код из письма</h1>
      <p class="subtitle">Мы отправили код на <strong>{{ user.email }}</strong> для аккаунта <strong>{{ user.username }}</strong>.</p>
    </header>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="flash-box">
        {% for message in messages %}
          <p>{{ message }}</p>
        {% endfor %}
      </div>
    {% endif %}
    {% endwith %}
    <section class="form-row">
      <form class="form-card" action="{{ url_for('forgot_password_verify') }}" method="post">
        <label>
          Код из письма
          <input class="code-input" name="reset_code" type="text" inputmode="numeric" maxlength="6" placeholder="000000" required>
        </label>
        <label>
          Новый пароль
          <input name="new_password" type="password" minlength="6" placeholder="Введите новый пароль" required>
        </label>
        <button type="submit" class="primary">Сменить пароль</button>
      </form>
      <form class="form-card" action="{{ url_for('forgot_password_resend') }}" method="post">
        <p class="subtitle">Не получили код?</p>
        <button type="submit" class="ghost-button full-width-button">Отправить код ещё раз</button>
        <a class="ghost-button link-button" href="{{ url_for('forgot_password') }}">Изменить почту</a>
      </form>
    </section>
  </main>
</body>
</html>
