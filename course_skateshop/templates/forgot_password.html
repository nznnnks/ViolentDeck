<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ViolentDeck — Восстановление пароля</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="auth-page">
    <header>
      <p class="eyebrow">Восстановление доступа</p>
      <h1>Забыли пароль?</h1>
      <p class="subtitle">Введите почту от аккаунта, и мы отправим код для смены пароля.</p>
    </header>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="flash-box">
        {% for message in messages %}
          <p>{{ message }}</p>
        {% endfor %}
      </div>
    {% endif %}
    {% endwith %}
    <section class="form-row">
      <form class="form-card" action="{{ url_for('forgot_password') }}" method="post">
        <label>
          Почта
          <input name="email" type="email" placeholder="you@example.com" required>
        </label>
        <button type="submit" class="primary">Отправить код</button>
        <a class="ghost-button link-button" href="{{ url_for('auth_page') }}">Вернуться ко входу</a>
      </form>
    </section>
  </main>
</body>
</html>
