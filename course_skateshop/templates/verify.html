<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ViolentDeck — Подтверждение почты</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="auth-page">
    <header>
      <p class="eyebrow">Подтверждение почты</p>
      <h1>Проверьте email</h1>
      <p class="subtitle">Мы отправили код на <strong>{{ email }}</strong> для аккаунта <strong>{{ username }}</strong>.</p>
    </header>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="flash-box">
        {% for message in messages %}
          <p>{{ message }}</p>
        {% endfor %}
      </div>
    {% endif %}
    {% endwith %}
    <section class="form-row">
      <form class="form-card" action="{{ url_for('verify_registration') }}" method="post">
        <label>
          Код подтверждения
          <input class="code-input" name="verification_code" type="text" inputmode="numeric" maxlength="6" placeholder="000000" required>
        </label>
        <button type="submit" class="primary">Подтвердить</button>
      </form>
      <form class="form-card" action="{{ url_for('resend_verification_code') }}" method="post">
        <p class="subtitle">Не получили письмо?</p>
        <button type="submit" class="ghost-button full-width-button">Отправить код ещё раз</button>
        <a class="ghost-button link-button" href="{{ url_for('auth_page') }}">Вернуться ко входу</a>
      </form>
    </section>
  </main>
</body>
</html>
