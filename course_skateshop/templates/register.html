<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ViolentDeck — Регистрация</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="auth-page">
    <header>
      <p class="eyebrow">Присоединяйся к ViolentDeck</p>
      <h1>Регистрация</h1>
      <p class="subtitle">Создай аккаунт, чтобы управлять покупками и списками.</p>
    </header>
    {% if get_flashed_messages() %}
      <div class="flash-box">
        {% for message in get_flashed_messages() %}
          <p>{{ message }}</p>
        {% endfor %}
      </div>
    {% endif %}
    <section class="form-row">
      <form class="form-card" action="{{ url_for('register') }}" method="post">
        <label>
          Имя пользователя
          <input name="register_username" type="text" placeholder="violent" required>
        </label>
        <label>
          Email
          <input name="register_email" type="email" placeholder="you@example.com" required>
        </label>
        <label>
          Пароль
          <input name="register_password" type="password" minlength="6" placeholder="••••••" required>
        </label>
        <button type="submit" class="primary">Зарегистрироваться</button>
      </form>
    </section>
  </main>
</body>
</html>
